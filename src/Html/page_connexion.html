<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="../static/Styles.css">
</head>
<body>

  <!-- header -->
  <header>
    <div class="logo">CESI-STAGES</div>
  </header>

  <!-- contenu principal -->
  <main>

    <!-- bienvenue -->
    <div class="bienvenue">
      <h1>Connexion à <span>votre espace</span></h1>
      <p>Entrez vos identifiants pour accéder à la plateforme CESI-STAGES.</p>
    </div>

    <div class="separateur"></div>

    <!-- formulaire -->
    <div class="form-section">
      <h2>Rentrer les informations suivantes</h2>

      <div class="form-fields">
        <div class="inputs">
          <div class="input-group">
            <label for="email">Identifiant (email)</label>
            <input type="email" id="email" placeholder="exemple@viacesi.fr">
          </div>
          <div class="input-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
          </div>
        </div>
        <button class="btn-connexion">Connexion</button>
      </div>

      <!-- liens -->
      <div class="form-links">
        <a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a>
        <a href="inscription.html">Pas de compte ? S'inscrire</a>
      </div>

    </div>

  </main>

  <!-- footer -->
  <footer>
    <p>&copy; 2026 <span>CESI-STAGES</span> — Tous droits réservés</p>
  </footer>

  <!-- bouton retour -->
  <a href="javascript:history.back()" class="btn-retour">&#8592; Retour</a>

</body>
</html>
