<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche d'Offres</title>
  <link rel="stylesheet" href="/static/Styles.css">
</head>
<body>

  <!-- header -->
  <header>
    <a href="javascript:history.back()" class="icon-btn" title="Retour">&#8592;</a>
    <div class="logo">CESI-STAGES</div>
    <div class="icon-btn" title="Mon profil">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
  </header>

  <!-- main -->
  <main>

    <!-- top -->
    <div class="top-section">
      <div class="bienvenue">
        <h1>Recherche d'<span>Offres de Stage</span></h1>
        <p>Parcourez les offres disponibles et postulez en un clic.</p>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Titre, compétence..." oninput="filterOffres()">
        <div class="divider-v"></div>
        <select id="filterVille" onchange="filterOffres()">
          <option value="">Toutes les villes</option>
          <option value="Paris">Paris</option>
          <option value="Toulouse">Toulouse</option>
          <option value="Lyon">Lyon</option>
          <option value="Bordeaux">Bordeaux</option>
          <option value="Grenoble">Grenoble</option>
        </select>
        <div class="divider-v"></div>
        <select id="filterDuree" onchange="filterOffres()">
          <option value="">⏱ Toutes durées</option>
          <option value="3 mois">3 mois</option>
          <option value="6 mois">6 mois</option>
        </select>
        <button class="btn-search" onclick="filterOffres()">Rechercher</button>
      </div>
    </div>

    <div class="separateur"></div>

    <!-- layout -->
    <div class="content-layout">

      <!-- liste -->
      <div class="liste-offres">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="liste-title">Liste des offres</div>
          <span class="results-count" id="resultsCount"></span>
        </div>
        <div id="listeContainer"></div>
      </div>

      <!-- fiche -->
      <div class="fiche-offre">
        <h3>Postuler</h3>

        <div class="fiche-placeholder" id="fichePlaceholder">
          <span class="icon">📄</span>
          <span>Sélectionnez une offre pour voir les détails</span>
        </div>

        <div class="fiche-content" id="ficheContent">
          <div class="fiche-row">
            <span class="fiche-label">Poste</span>
            <span class="fiche-value" id="fichePoste">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Entreprise</span>
            <span class="fiche-value" id="ficheEntreprise">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Ville</span>
            <span class="fiche-value" id="ficheVille">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Durée</span>
            <span class="fiche-value" id="ficheDuree">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Gratification</span>
            <span class="fiche-value" id="ficheGrat">—</span>
          </div>
          <button class="btn-postuler">✉️ Postuler</button>
          <button class="btn-fiche-detail">Voir la fiche complète →</button>
        </div>
      </div>

    </div>
  </main>

  <!-- footer -->
  <footer>
    <p>&copy; 2026 <span>CESI-STAGES</span> — Tous droits réservés</p>
  </footer>

  <script>
    const offres = [
      { poste: "Développeur Web Full-Stack", entreprise: "Capgemini", ville: "Paris", duree: "6 mois", grat: "800 €/mois", domaine: "Informatique" },
      { poste: "Ingénieur Mécanique", entreprise: "Airbus", ville: "Toulouse", duree: "6 mois", grat: "900 €/mois", domaine: "Aéronautique" },
      { poste: "Data Analyst", entreprise: "Orange", ville: "Paris", duree: "6 mois", grat: "850 €/mois", domaine: "Informatique" },
      { poste: "Technicien Électronique", entreprise: "Thales", ville: "Grenoble", duree: "3 mois", grat: "700 €/mois", domaine: "Électronique" },
      { poste: "Chef de Projet Digital", entreprise: "Renault", ville: "Paris", duree: "6 mois", grat: "820 €/mois", domaine: "Management" },
      { poste: "Ingénieur Énergie", entreprise: "Schneider Electric", ville: "Grenoble", duree: "6 mois", grat: "880 €/mois", domaine: "Énergie" },
      { poste: "Développeur Mobile", entreprise: "Capgemini", ville: "Lyon", duree: "3 mois", grat: "750 €/mois", domaine: "Informatique" },
      { poste: "Chargé de Communication", entreprise: "Orange", ville: "Bordeaux", duree: "3 mois", grat: "680 €/mois", domaine: "Communication" },
    ];

    let activeIndex = null;

    function renderOffres(list) {
      const container = document.getElementById('listeContainer');
      const count = document.getElementById('resultsCount');
      count.textContent = list.length + ' offre(s) trouvée(s)';
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = '<p style="color:#aaa;font-style:italic;font-size:0.85rem;padding:10px 0;">Aucune offre trouvée.</p>';
        return;
      }
      list.forEach((o, i) => {
        const card = document.createElement('div');
        card.className = 'offre-card' + (activeIndex === i ? ' active' : '');
        card.innerHTML = `
          <div class="offre-top">
            <span class="offre-titre">${o.poste}</span>
            <span class="offre-badge">${o.duree}</span>
          </div>
          <div class="offre-meta">
            <span>🏢 ${o.entreprise}</span>
            <span>📍 ${o.ville}</span>
            <span>💰 ${o.grat}</span>
          </div>
        `;
        card.onclick = () => selectOffre(i, list);
        container.appendChild(card);
      });
    }

    function selectOffre(index, list) {
      activeIndex = index;
      const o = list[index];
      document.getElementById('fichePoste').textContent = o.poste;
      document.getElementById('ficheEntreprise').textContent = o.entreprise;
      document.getElementById('ficheVille').textContent = o.ville;
      document.getElementById('ficheDuree').textContent = o.duree;
      document.getElementById('ficheGrat').textContent = o.grat;
      document.getElementById('fichePlaceholder').style.display = 'none';
      document.getElementById('ficheContent').classList.add('visible');
      renderOffres(list);
    }

    function filterOffres() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const ville = document.getElementById('filterVille').value;
      const duree = document.getElementById('filterDuree').value;
      const filtered = offres.filter(o =>
        (o.poste.toLowerCase().includes(q) || o.entreprise.toLowerCase().includes(q) || o.domaine.toLowerCase().includes(q)) &&
        (ville === '' || o.ville === ville) &&
        (duree === '' || o.duree === duree)
      );
      activeIndex = null;
      document.getElementById('fichePlaceholder').style.display = 'flex';
      document.getElementById('ficheContent').classList.remove('visible');
      renderOffres(filtered);
    }

    renderOffres(offres);
  </script>

</body>
</html>
