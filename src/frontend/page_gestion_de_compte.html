<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de compte</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background-color: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    header {
      background-color: #111111;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* --- MAIN --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      gap: 28px;
    }

    /* bienvenue */
    .bienvenue {
      text-align: center;
      max-width: 500px;
    }

    .bienvenue h1 {
      font-size: 1.6rem;
      color: #111111;
      margin-bottom: 8px;
    }

    .bienvenue h1 span {
      color: #FFD700;
    }

    .bienvenue p {
      font-size: 0.95rem;
      color: #444444;
      line-height: 1.6;
    }

    /* separateur */
    .separateur {
      width: 60px;
      height: 4px;
      background-color: #FFD700;
      border-radius: 2px;
    }

    /* --- BLOCS COMMUNS --- */
    .bloc {
      background-color: #f9f9f9;
      border: 2px solid #111111;
      border-radius: 12px;
      padding: 28px 35px;
      max-width: 500px;
      width: 100%;
    }

    .bloc h2 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #111111;
      margin-bottom: 18px;
    }

    /* --- NOM D'UTILISATEUR --- */
    .nom-actuel {
      background-color: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #444444;
      margin-bottom: 14px;
      text-align: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #111111;
    }

    .input-group input {
      padding: 10px 12px;
      border: 2px solid #111111;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: 'Montserrat', sans-serif;
      outline: none;
      background-color: #ffffff;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #FFD700;
    }

    /* bouton changement nom */
    .btn-changement {
      width: 100%;
      background-color: #111111;
      color: #ffffff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-changement:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }

    /* --- INPUTS MDP --- */
    .inputs {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* --- BOUTON CONFIRMER --- */
    .btn-confirmer {
      width: 100%;
      max-width: 500px;
      background-color: #FFD700;
      color: #111111;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 900;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-confirmer:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    /* --- FOOTER --- */
    footer {
      background-color: #111111;
      color: #aaaaaa;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }

    footer span {
      color: #FFD700;
      font-weight: bold;
    }

    /* --- BOUTON RETOUR --- */
    .btn-retour {
      position: fixed;
      bottom: 18px;
      left: 18px;
      background-color: #ffffff;
      color: #111111;
      border: 2px solid #111111;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 0.2s, color 0.2s;
    }

    .btn-retour:hover {
      background-color: #FFD700;
      border-color: #FFD700;
    }

    @media (max-width: 480px) {
      .bloc {
        padding: 20px 16px;
      }
    }

  </style>
</head>
<body>

  <!-- header -->
  <header>
    <div class="logo">CESI-STAGES</div>
  </header>

  <!-- contenu principal -->
  <main>

    <!-- bienvenue -->
    <div class="bienvenue">
      <h1>Gestion de <span>votre compte</span></h1>
      <p>Modifiez votre nom d'utilisateur ou votre mot de passe depuis cette page.</p>
    </div>

    <div class="separateur"></div>

    <!-- bloc nom d'utilisateur -->
    <div class="bloc">
      <h2>Nom d'utilisateur</h2>
      <div class="nom-actuel">Nom actuel</div>
      <div class="input-group">
        <label for="new-username">Nouveau nom d'utilisateur</label>
        <input type="text" id="new-username" placeholder="Entrer un nouveau nom...">
      </div>
      <button class="btn-changement">Changement</button>
    </div>

    <!-- bloc changement mot de passe -->
    <div class="bloc">
      <h2>Changement de mot de passe</h2>
      <div class="inputs">
        <div class="input-group">
          <label for="mdp-actuel">Mot de passe actuel</label>
          <input type="password" id="mdp-actuel" placeholder="Entrer votre mot de passe actuel">
        </div>
        <div class="input-group">
          <label for="new-mdp">Nouveau mot de passe</label>
          <input type="password" id="new-mdp" placeholder="Entrer un nouveau mot de passe">
        </div>
        <div class="input-group">
          <label for="confirm-mdp">Confirmation mot de passe</label>
          <input type="password" id="confirm-mdp" placeholder="Entrer à nouveau le nouveau mot de passe">
        </div>
      </div>
    </div>

    <!-- bouton confirmer -->
    <button class="btn-confirmer">Confirmer les changements</button>

  </main>

  <!-- footer -->
  <footer>
    <p>&copy; 2026 <span>CESI-STAGES</span> — Tous droits réservés</p>
  </footer>

  <!-- bouton retour -->
  <a href="javascript:history.back()" class="btn-retour">&#8592; Retour</a>

</body>
</html>
