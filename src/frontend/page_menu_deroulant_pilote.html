<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Pilote</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background-color: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    header {
      background-color: #111111;
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 4px;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    /* icone profil cliquable */
    .profil-icon {
      width: 44px;
      height: 44px;
      background-color: #FFD700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity 0.2s;
      position: relative;
    }

    .profil-icon:hover {
      opacity: 0.8;
    }

    .profil-icon svg {
      width: 24px;
      height: 24px;
      fill: #111111;
    }

    /* --- MENU DEROULANT --- */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 18px;
      width: 280px;
      background-color: #ffffff;
      border: 2px solid #111111;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      overflow: hidden;
      z-index: 999;
      display: none;
      flex-direction: column;
    }

    .dropdown.open {
      display: flex;
    }

    /* en-tete du menu avec avatar */
    .dropdown-header {
      background-color: #111111;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background-color: #FFD700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar svg {
      width: 22px;
      height: 22px;
      fill: #111111;
    }

    .dropdown-header .user-info {
      display: flex;
      flex-direction: column;
    }

    .dropdown-header .user-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
    }

    .dropdown-header .user-role {
      font-size: 0.75rem;
      color: #FFD700;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* separateur */
    .dropdown-sep {
      height: 2px;
      background-color: #f0f0f0;
    }

    .dropdown-sep.dark {
      background-color: #e0e0e0;
      margin: 4px 0;
    }

    /* items du menu */
    .dropdown-item {
      display: block;
      padding: 13px 20px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-decoration: none;
      color: #111111;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s, padding-left 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'Montserrat', sans-serif;
    }

    .dropdown-item:hover {
      background-color: #fffbea;
      color: #111111;
      padding-left: 26px;
      border-left: 3px solid #FFD700;
    }

    /* item deconnecter */
    .dropdown-item.deconnecter {
      color: #cc0000;
    }

    .dropdown-item.deconnecter:hover {
      background-color: #fff0f0;
      color: #cc0000;
      border-left: 3px solid #cc0000;
    }

    /* item supprimer */
    .dropdown-item.supprimer {
      color: #cc0000;
    }

    .dropdown-item.supprimer:hover {
      background-color: #fff0f0;
      color: #cc0000;
      border-left: 3px solid #cc0000;
    }

    /* --- DEMO PAGE --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      gap: 16px;
      text-align: center;
    }

    .demo-hint {
      font-size: 0.9rem;
      color: #888888;
      font-style: italic;
    }

    .arrow {
      font-size: 2rem;
      color: #FFD700;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* --- FOOTER --- */
    footer {
      background-color: #111111;
      color: #aaaaaa;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }

    footer span {
      color: #FFD700;
      font-weight: bold;
    }

    /* --- BOUTON RETOUR --- */
    .btn-retour {
      position: fixed;
      bottom: 18px;
      left: 18px;
      background-color: #ffffff;
      color: #111111;
      border: 2px solid #111111;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 0.2s, color 0.2s;
      z-index: 1000;
    }

    .btn-retour:hover {
      background-color: #FFD700;
      border-color: #FFD700;
    }

  </style>
</head>
<body>

  <!-- header -->
  <header>
    <!-- icone profil avec menu -->
    <div class="profil-icon" id="profilBtn" title="Mon profil" onclick="toggleMenu()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>

    <div class="logo">CESI-STAGES</div>
    <div style="width:44px;"></div>

    <!-- menu deroulant -->
    <div class="dropdown" id="dropdownMenu">

      <!-- en-tete -->
      <div class="dropdown-header">
        <div class="avatar">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <div class="user-info">
          <span class="user-name">Hugo Forato</span>
          <span class="user-role">Pilote</span>
        </div>
      </div>

      <div class="dropdown-sep"></div>

      <!-- navigation -->
      <a href="espace-eleve.html" class="dropdown-item">👨‍🎓 Espace Élève</a>
      <a href="gestion-entreprise.html" class="dropdown-item">🏢 Espace Gestion Entreprise</a>
      <a href="gestion-offre.html" class="dropdown-item">📋 Espace Gestion Offre</a>

      <div class="dropdown-sep dark"></div>

      <!-- deconnecter -->
      <a href="connexion.html" class="dropdown-item deconnecter">🔌 Se déconnecter</a>

      <div class="dropdown-sep dark"></div>

      <!-- compte -->
      <a href="gestion-compte.html" class="dropdown-item">⚙️ Modifier le compte</a>
      <a href="#" class="dropdown-item supprimer" onclick="confirmerSuppression()">🗑️ Supprimer le compte</a>

    </div>
  </header>

  <!-- contenu demo -->
  <main>
    <div class="arrow">↖</div>
    <p class="demo-hint">Cliquez sur l'icône profil en haut à gauche<br>pour ouvrir le menu déroulant</p>
  </main>

  <!-- footer -->
  <footer>
    <p>&copy; 2026 <span>CESI-STAGES</span> — Tous droits réservés</p>
  </footer>

  <!-- bouton retour -->
  <a href="javascript:history.back()" class="btn-retour">&#8592; Retour</a>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      menu.classList.toggle('open');
    }

    // fermer le menu si on clique ailleurs
    document.addEventListener('click', function(e) {
      const btn = document.getElementById('profilBtn');
      const menu = document.getElementById('dropdownMenu');
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    function confirmerSuppression() {
      if (confirm('Êtes-vous sûr de vouloir supprimer votre compte ? Cette action est irréversible.')) {
        window.location.href = 'connexion.html';
      }
    }
  </script>

</body>
</html>
