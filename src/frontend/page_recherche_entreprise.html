<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche Entreprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background-color: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    header {
      background-color: #111111;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 4px;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      background-color: #FFD700;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      transition: opacity 0.2s;
      font-size: 1.1rem;
      font-weight: 900;
      color: #111111;
    }

    .icon-btn:hover { opacity: 0.8; }

    .icon-btn svg {
      width: 22px;
      height: 22px;
      fill: #111111;
    }

    /* --- MAIN --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px 24px;
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    /* bienvenue + barre de recherche */
    .top-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bienvenue h1 {
      font-size: 1.4rem;
      color: #111111;
    }

    .bienvenue h1 span { color: #FFD700; }

    .bienvenue p {
      font-size: 0.9rem;
      color: #555555;
      margin-top: 4px;
    }

    /* barre recherche */
    .search-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      background-color: #f9f9f9;
      border: 2px solid #111111;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.9rem;
      font-family: 'Montserrat', sans-serif;
      background: transparent;
      color: #111111;
    }

    .search-bar input::placeholder { color: #aaaaaa; font-style: italic; }

    .btn-search {
      background-color: #FFD700;
      color: #111111;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 900;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-search:hover { opacity: 0.85; transform: translateY(-1px); }

    /* separateur */
    .separateur {
      width: 50px;
      height: 4px;
      background-color: #FFD700;
      border-radius: 2px;
    }

    /* --- LAYOUT LISTE + FICHE --- */
    .content-layout {
      display: flex;
      gap: 20px;
      flex: 1;
      align-items: flex-start;
    }

    /* --- LISTE ENTREPRISES --- */
    .liste-entreprises {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .liste-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #111111;
      margin-bottom: 4px;
    }

    .entreprise-card {
      background-color: #f9f9f9;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .entreprise-card:hover,
    .entreprise-card.active {
      border-color: #FFD700;
      background-color: #fffbea;
      transform: translateX(4px);
    }

    .entreprise-card.active {
      border-left: 4px solid #FFD700;
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #111111;
    }

    .card-meta {
      font-size: 0.78rem;
      color: #777777;
    }

    .card-arrow {
      font-size: 1.1rem;
      color: #FFD700;
      font-weight: 900;
    }

    /* --- FICHE ENTREPRISE --- */
    .fiche-entreprise {
      flex: 1;
      background-color: #f9f9f9;
      border: 2px solid #111111;
      border-radius: 12px;
      padding: 20px;
      position: sticky;
      top: 20px;
      min-width: 220px;
    }

    .fiche-entreprise h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #111111;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #FFD700;
    }

    .fiche-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 30px 10px;
      color: #aaaaaa;
      text-align: center;
      font-size: 0.82rem;
      font-style: italic;
    }

    .fiche-placeholder .icon { font-size: 2rem; }

    .fiche-content { display: none; flex-direction: column; gap: 10px; }
    .fiche-content.visible { display: flex; }

    .fiche-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .fiche-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #888888;
      letter-spacing: 0.5px;
    }

    .fiche-value {
      font-size: 0.88rem;
      font-weight: 700;
      color: #111111;
    }

    .btn-fiche {
      margin-top: 10px;
      width: 100%;
      background-color: #111111;
      color: #ffffff;
      border: none;
      padding: 10px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.2s;
    }

    .btn-fiche:hover { background-color: #FFD700; color: #111111; }

    /* --- FOOTER --- */
    footer {
      background-color: #111111;
      color: #aaaaaa;
      text-align: center;
      padding: 18px;
      font-size: 0.85rem;
      margin-top: 30px;
    }

    footer span { color: #FFD700; font-weight: bold; }

    /* --- BOUTON RETOUR --- */
    .btn-retour {
      position: fixed;
      bottom: 18px;
      left: 18px;
      background-color: #ffffff;
      color: #111111;
      border: 2px solid #111111;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      transition: background-color 0.2s;
      z-index: 100;
    }

    .btn-retour:hover { background-color: #FFD700; border-color: #FFD700; }

    @media (max-width: 600px) {
      .content-layout { flex-direction: column; }
      .fiche-entreprise { position: static; }
    }

  </style>
</head>
<body>

  <!-- header -->
  <header>
    <a href="javascript:history.back()" class="icon-btn" title="Retour">&#8592;</a>
    <div class="logo">CESI-STAGES</div>
    <div class="icon-btn" title="Mon profil" onclick="toggleMenu()">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
  </header>

  <!-- main -->
  <main>

    <!-- top -->
    <div class="top-section">
      <div class="bienvenue">
        <h1>Recherche <span>Entreprise</span></h1>
        <p>Trouvez une entreprise partenaire et accédez à sa fiche détaillée.</p>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Nom, secteur, ville..." oninput="filterEntreprises()">
        <button class="btn-search" onclick="filterEntreprises()">🔍 Rechercher</button>
      </div>
    </div>

    <div class="separateur"></div>

    <!-- layout liste + fiche -->
    <div class="content-layout">

      <!-- liste -->
      <div class="liste-entreprises">
        <div class="liste-title">📋 Liste des entreprises</div>
        <div id="listeContainer"></div>
      </div>

      <!-- fiche -->
      <div class="fiche-entreprise">
        <h3>Accéder à la fiche entreprise</h3>

        <div class="fiche-placeholder" id="fichePlaceholder">
          <span class="icon">🏢</span>
          <span>Sélectionnez une entreprise pour voir sa fiche</span>
        </div>

        <div class="fiche-content" id="ficheContent">
          <div class="fiche-row">
            <span class="fiche-label">Nom</span>
            <span class="fiche-value" id="ficheNom">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Secteur</span>
            <span class="fiche-value" id="ficheSecteur">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Ville</span>
            <span class="fiche-value" id="ficheVille">—</span>
          </div>
          <div class="fiche-row">
            <span class="fiche-label">Contact</span>
            <span class="fiche-value" id="ficheContact">—</span>
          </div>
          <button class="btn-fiche">Voir la fiche complète →</button>
        </div>
      </div>

    </div>
  </main>

  <!-- footer -->
  <footer>
    <p>&copy; 2026 <span>CESI-STAGES</span> — Tous droits réservés</p>
  </footer>

  <script>
    const entreprises = [
      { nom: "Airbus", secteur: "Aéronautique", ville: "Toulouse", contact: "rh@airbus.com" },
      { nom: "Capgemini", secteur: "Informatique", ville: "Paris", contact: "stages@capgemini.fr" },
      { nom: "Renault", secteur: "Automobile", ville: "Boulogne-Billancourt", contact: "recrutement@renault.com" },
      { nom: "Orange", secteur: "Télécommunications", ville: "Paris", contact: "stages@orange.fr" },
      { nom: "Schneider Electric", secteur: "Énergie", ville: "Grenoble", contact: "rh@schneider.com" },
      { nom: "Thales", secteur: "Défense & Technologie", ville: "Vélizy", contact: "stages@thales.fr" },
    ];

    let activeIndex = null;

    function renderEntreprises(list) {
      const container = document.getElementById('listeContainer');
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = '<p style="color:#aaa;font-style:italic;font-size:0.85rem;padding:10px 0;">Aucune entreprise trouvée.</p>';
        return;
      }
      list.forEach((e, i) => {
        const card = document.createElement('div');
        card.className = 'entreprise-card' + (activeIndex === i ? ' active' : '');
        card.innerHTML = `
          <div class="card-info">
            <span class="card-name">${e.nom}</span>
            <span class="card-meta">${e.secteur} · ${e.ville}</span>
          </div>
          <span class="card-arrow">›</span>
        `;
        card.onclick = () => selectEntreprise(i, list);
        container.appendChild(card);
      });
    }

    function selectEntreprise(index, list) {
      activeIndex = index;
      const e = list[index];
      document.getElementById('ficheNom').textContent = e.nom;
      document.getElementById('ficheSecteur').textContent = e.secteur;
      document.getElementById('ficheVille').textContent = e.ville;
      document.getElementById('ficheContact').textContent = e.contact;
      document.getElementById('fichePlaceholder').style.display = 'none';
      document.getElementById('ficheContent').classList.add('visible');
      renderEntreprises(list);
    }

    function filterEntreprises() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = entreprises.filter(e =>
        e.nom.toLowerCase().includes(q) ||
        e.secteur.toLowerCase().includes(q) ||
        e.ville.toLowerCase().includes(q)
      );
      activeIndex = null;
      document.getElementById('fichePlaceholder').style.display = 'flex';
      document.getElementById('ficheContent').classList.remove('visible');
      renderEntreprises(filtered);
    }

    // init
    renderEntreprises(entreprises);
  </script>

</body>
</html>
